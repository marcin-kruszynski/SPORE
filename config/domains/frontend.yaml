id: frontend
name: Frontend
policyPacks: [ui-core]
leadProfile: frontend-lead
defaultBuilderProfile: frontend-builder
defaultScoutProfile: frontend-scout
defaultTesterProfile: browser-tester
defaultReviewerProfile: ui-reviewer
tools: [docs-kb, browser-runner]
skills: [ui-implementation, accessibility, interaction-design]
workflowDefaults: [feature-delivery, review-pass]
workflowPolicy:
  maxAttemptsByRole:
    builder: 3
    tester: 2
  reviewRequired: true
  approvalRequired: true
docsKbPolicy:
  queryTerms: [frontend]
coordinationPolicy:
  autoHoldParentOnOpenChildEscalation: true
  resumeParentWhenChildrenSettled: true
  maxHeldMs: 90000
  escalateOnFamilyStallMs: 45000
