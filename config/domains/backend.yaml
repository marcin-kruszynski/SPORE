id: backend
name: Backend
taskClass: runtime-validation
pathPrefixes: [packages/runtime-pi, services/session-gateway, services/orchestrator, packages/orchestrator]
policyPacks: [service-core]
leadProfile: backend-lead
defaultBuilderProfile: backend-builder
defaultScoutProfile: backend-scout
defaultTesterProfile: api-tester
defaultReviewerProfile: service-reviewer
tools: [docs-kb, api-prober, shell]
skills: [service-design, api-analysis, codegen]
workflowDefaults: [feature-delivery, bugfix]
workflowPolicy:
  maxAttemptsByRole:
    builder: 4
    tester: 3
  reviewRequired: true
  approvalRequired: true
docsKbPolicy:
  queryTerms: [backend]
coordinationPolicy:
  autoHoldParentOnOpenChildEscalation: true
  resumeParentWhenChildrenSettled: true
  maxHeldMs: 120000
  escalateOnFamilyStallMs: 60000
