id: backend
name: Backend
policyPacks: [service-core]
leadProfile: backend-lead
defaultBuilderProfile: backend-builder
defaultScoutProfile: backend-scout
defaultTesterProfile: api-tester
defaultReviewerProfile: service-reviewer
tools: [docs-kb, api-prober, shell]
skills: [service-design, api-analysis, codegen]
workflowDefaults: [feature-delivery, bugfix]
workflowPolicy:
  maxAttemptsByRole:
    builder: 4
    tester: 3
  reviewRequired: true
  approvalRequired: true
docsKbPolicy:
  queryTerms: [backend]
