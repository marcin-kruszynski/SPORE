id: cli
name: CLI
taskClass: general-self-work
pathPrefixes: [packages/tui, apps/cli]
policyPacks: [cli-core]
leadProfile: cli-lead
defaultBuilderProfile: cli-builder
defaultScoutProfile: cli-scout
defaultTesterProfile: cli-tester
defaultReviewerProfile: cli-reviewer
tools: [docs-kb, shell]
skills: [terminal-ux, scripting, release-checks]
workflowDefaults: [feature-delivery, review-pass]
workflowPolicy:
  maxAttemptsByRole:
    builder: 3
  reviewRequired: true
docsKbPolicy:
  queryTerms: [cli]
coordinationPolicy:
  autoHoldParentOnOpenChildEscalation: true
  resumeParentWhenChildrenSettled: true
  maxHeldMs: 60000
  escalateOnFamilyStallMs: 30000
