id: cli
name: CLI
leadProfile: cli-lead
defaultBuilderProfile: cli-builder
defaultScoutProfile: cli-scout
defaultTesterProfile: cli-tester
defaultReviewerProfile: cli-reviewer
tools: [docs-kb, shell]
skills: [terminal-ux, scripting, release-checks]
workflowDefaults: [feature-delivery, review-pass]
workflowPolicy:
  defaultRoles: [lead, builder, tester, reviewer]
  stepSoftTimeoutMs: 20000
  stepHardTimeoutMs: 60000
  defaultMaxAttempts: 2
  maxAttemptsByRole:
    builder: 3
  reviewRequired: true
  approvalRequired: false
runtimePolicy:
  sessionModeByRole:
    lead: persistent
    builder: ephemeral
    tester: ephemeral
    reviewer: persistent
docsKbPolicy:
  resultLimit: 5
  queryTerms: [cli, shell, terminal, command]
