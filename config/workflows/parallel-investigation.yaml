id: parallel-investigation
name: Parallel Investigation
triggerType: manual
applicableProjectTypes: [platform, application, service]
roleSequence: [lead, scout, builder, reviewer]
stepSets:
  - name: framing
    roles: [lead]
    gate:
      mode: all
    policy:
      maxActiveMs: 20000
      onTimeout: hold_execution
      onFailure: fail_execution
      blockNextWaveOnOpenEscalation: true
  - name: parallel-investigation
    roles: [scout, builder]
    gate:
      mode: min_success_count
      count: 2
    policy:
      maxActiveMs: 30000
      onTimeout: open_escalation
      onFailure: open_escalation
      blockNextWaveOnOpenEscalation: true
  - name: synthesis
    roles: [reviewer]
    gate:
      mode: all
    policy:
      maxActiveMs: 15000
      onTimeout: hold_execution
      onFailure: fail_execution
      blockNextWaveOnOpenEscalation: true
branchingConditions:
  - if: evidence-conflicts
    then: request-branch-rework
reviewStep:
  required: true
retryPolicy:
  maxAttempts: 2
documentationUpdatePolicy:
  required: true
completionRequirements:
  - findings-documented
  - implementation-notes-captured
  - review-verdict-recorded
