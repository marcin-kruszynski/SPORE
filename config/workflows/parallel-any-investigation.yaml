id: parallel-any-investigation
name: Parallel Any Investigation
triggerType: manual
applicableProjectTypes: [platform, application, service]
roleSequence: [lead, scout, builder, reviewer]
stepSets:
  - name: framing
    roles: [lead]
    gate:
      mode: all
  - name: exploratory-split
    roles: [scout, builder]
    gate:
      mode: any
  - name: synthesis
    roles: [reviewer]
    gate:
      mode: all
branchingConditions:
  - if: evidence-conflicts
    then: request-branch-rework
reviewStep:
  required: true
retryPolicy:
  maxAttempts: 2
documentationUpdatePolicy:
  required: true
completionRequirements:
  - findings-documented
  - review-verdict-recorded
