id: frontend-ui-pass
name: Frontend UI Pass
triggerType: manual
applicableProjectTypes: [platform, application]
roleSequence: [lead, scout, builder, tester, reviewer]
stepSets:
  - name: framing
    roles: [lead, scout]
    gate:
      mode: all
    policy:
      maxActiveMs: 30000
      onTimeout: hold_execution
      onFailure: hold_execution
      blockNextWaveOnOpenEscalation: true
  - name: ui-build
    roles: [builder, tester]
    gate:
      mode: any
    policy:
      maxActiveMs: 75000
      onTimeout: open_escalation
      onFailure: open_escalation
      blockNextWaveOnOpenEscalation: false
  - name: ui-review
    roles: [reviewer]
    gate:
      mode: all
    policy:
      maxActiveMs: 30000
      onTimeout: hold_execution
      onFailure: fail_execution
      blockNextWaveOnOpenEscalation: true
reviewStep:
  required: true
retryPolicy:
  maxAttempts: 2
documentationUpdatePolicy:
  required: true
completionRequirements:
  - design-feedback-recorded
  - browser-evidence-recorded
  - review-verdict-recorded
