id: local-all
label: Local All
scenarios: [backend-service-delivery, frontend-ui-pass, cli-verification-pass, docs-adr-pass]
realPiRequired: false
stopOnFailure: false
concurrency: 1
timeoutMs: 240000
artifactRetention: default
historyRetentionDays: 14
retainFailedRuns: true
schedule:
  enabled: true
  cronLike: @daily
  maxParallelRuns: 1
  skipIfRunActive: true
tags: [local, canonical]
