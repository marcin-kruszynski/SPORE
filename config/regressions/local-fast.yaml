id: local-fast
label: Local Fast
scenarios: [backend-service-delivery, frontend-ui-pass, cli-verification-pass]
realPiRequired: false
stopOnFailure: false
concurrency: 1
timeoutMs: 180000
artifactRetention: default
historyRetentionDays: 14
retainFailedRuns: true
schedule:
  enabled: true
  cronLike: every-30m
  maxParallelRuns: 1
  skipIfRunActive: true
tags: [local, fast]
