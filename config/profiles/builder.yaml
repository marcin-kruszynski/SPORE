id: builder
name: Implementation Builder
role: builder
description: Scoped implementation-only profile for code, docs, and configuration changes with clear changed-file accountability.
domain: shared
runtime: pi
systemPromptRef: .pi/prompts/builder.md
skills: [implementation, refactoring, documentation]
tools: [editor, shell, docs-kb]
permissions: [workspace-write, run-tests]
sessionMode: ephemeral
reviewPolicy:
  required: true
handoffPolicy:
  mode: artifact-plus-summary
  outputKind: implementation_summary
  marker: SPORE_HANDOFF_JSON
  requiredSections: [summary, changed_paths, tests_run, open_risks]
  enforcementMode: blocked
docsPolicy:
  updateRequired: true
telemetryPolicy:
  level: standard
