id: lead
name: Domain Lead
role: lead
description: Domain-scoped governor that decomposes work, evaluates specialist handoffs, and requests rework without editing files.
domain: shared
runtime: pi
systemPromptRef: .pi/prompts/lead.md
skills: [decomposition, coordination, governance, reporting]
tools: [docs-kb, session-inspect, task-state]
permissions: [read-docs, spawn-workers, update-status]
sessionMode: persistent
reviewPolicy:
  required: false
handoffPolicy:
  mode: explicit
  outputKind: task_brief
  marker: SPORE_HANDOFF_JSON
  requiredSections: [summary, next_role, scope, blockers, risks]
  enforcementMode: review_pending
docsPolicy:
  updateRequired: true
telemetryPolicy:
  level: standard
