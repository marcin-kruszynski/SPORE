id: integration-ready-core
label: Integration Ready Core
description: Promotion gate for integrator lanes targeting integration branches.
scenarios:
  - docs-adr-pass
  - cli-verification-pass
  - self-build-promotion-integration
  - self-build-quarantine-recovery
regressions:
  - local-fast
  - self-build-autonomy
requiredForProposalReadiness: true
requiredForPromotionReadiness: true
allowedAutoSkip: false
allowedFailureClassifications: []
maxDurationMs: 600000
appliesToTemplates:
  - operator-ui-pass
  - runtime-validation-pass
  - config-schema-maintenance
appliesToMutationScopes:
  - docs
  - config
  - apps/web
appliesToProjectRoles:
  - integrator
