id: spore
name: SPORE
type: orchestration-platform
coordinatorProfile: coordinator
integratorProfile: integrator
activeDomains:
  - id: docs
    policyPacks: [docs-core]
    leadProfile: lead
    scoutProfile: scout
    builderProfile: builder
    testerProfile: tester
    reviewerProfile: reviewer
    tools: [docs-kb, shell]
    skills: [documentation-maintenance, adr-writing]
    workflowPreferences: [docs-adr-pass, review-pass]
    docsKbPolicy:
      queryTerms: [spore, docs, architecture, runbooks]
      resultLimit: 8
    coordinationPolicy:
      maxHeldMs: 120000
  - id: backend
    policyPacks: [platform-backend]
    leadProfile: lead
    scoutProfile: scout
    builderProfile: builder
    testerProfile: tester
    reviewerProfile: reviewer
    tools: [docs-kb, shell]
    skills: [service-design, runtime-integration, sqlite]
    workflowPreferences: [backend-service-delivery, bugfix, review-pass]
    workflowPolicy:
      defaultRoles: [lead, builder, tester, reviewer]
      retryTargetRole: builder
      resetDescendantSteps: true
      maxAttemptsByRole:
        builder: 5
    docsKbPolicy:
      queryTerms: [spore, backend, orchestrator, runtime]
      resultLimit: 8
    coordinationPolicy:
      maxHeldMs: 180000
      escalateOnFamilyStallMs: 90000
  - id: cli
    policyPacks: [cli-core]
    leadProfile: lead
    scoutProfile: scout
    builderProfile: builder
    testerProfile: tester
    reviewerProfile: reviewer
    tools: [docs-kb, shell]
    skills: [terminal-ux, scripting]
    workflowPreferences: [cli-verification-pass, review-pass]
    workflowPolicy:
      approvalRequired: false
    docsKbPolicy:
      queryTerms: [spore, cli, operator, terminal]
      resultLimit: 6
    coordinationPolicy:
      maxHeldMs: 90000
  - id: frontend
    policyPacks: [ui-core]
    leadProfile: lead
    scoutProfile: scout
    builderProfile: builder
    testerProfile: tester
    reviewerProfile: reviewer
    tools: [docs-kb, shell]
    skills: [design-implementation, browser-validation]
    workflowPreferences: [frontend-ui-pass, review-pass]
    workflowPolicy:
      defaultRoles: [lead, scout, builder, tester, reviewer]
    docsKbPolicy:
      queryTerms: [spore, web, dashboard, operator]
      resultLimit: 8
    coordinationPolicy:
      maxHeldMs: 120000
attachedTeams: [web-app-team, service-team]
profileVariants:
  - builder
  - tester
  - reviewer
workflowDefaults: [backend-service-delivery, frontend-ui-pass, cli-verification-pass, docs-adr-pass]
policyPacks: [self-build-safe, self-build-proposals]
projectCoordinationPolicy:
  workflow: project-coordination-root
  workflowPolicy:
    defaultRoles: [coordinator]
    stepSoftTimeoutMs: 30000
    stepHardTimeoutMs: 120000
  runtimePolicy:
    sessionModeByRole:
      coordinator: persistent
    workspace:
      enabled: false
      disabledRoles: [coordinator]
      safeMode: true
  docsKbPolicy:
    queryTerms: [spore, project, coordination, self-build]
    resultLimit: 8
  coordinationPolicy:
    autoHoldParentOnOpenChildEscalation: true
    resumeParentWhenChildrenSettled: true
    maxHeldMs: 180000
    escalateOnFamilyStallMs: 90000
promotionPolicy:
  workflow: feature-promotion
  targetBranch: main
  integrationBranchPrefix: spore/promote
  autoMergeToTarget: false
  requireFreshTarget: true
  allowMechanicalConflictResolution: true
  allowIntegratorAutoLand: false
  requireHumanApprovalToLand: true
  validationBundles: [local-fast]
  workflowPolicy:
    defaultRoles: [integrator]
    stepSoftTimeoutMs: 30000
    stepHardTimeoutMs: 120000
  runtimePolicy:
    sessionModeByRole:
      integrator: persistent
    workspace:
      enabled: true
      enabledRoles: [integrator]
      safeMode: true
      source: promotion-lane
      mutationScope: [docs, config, apps/web]
  docsKbPolicy:
    queryTerms: [spore, promotion, integration, proposal]
    resultLimit: 8
  coordinationPolicy:
    autoHoldParentOnOpenChildEscalation: true
    autoHoldParentOnOpenPromotionEscalation: true
    resumeParentWhenChildrenSettled: true
    resumeParentWhenPromotionSettled: true
    maxHeldMs: 180000
    escalateOnFamilyStallMs: 90000
docsLocation: docs/
embeddingIndex:
  provider: local-bootstrap
  storePath: data/docs-index/spore-docs.sqlite
uiSettings:
  surfaces: [cli, tui, web]
runtimePolicies:
  runtime: pi
  liveInspectionRequired: true
selfWorkDefaults:
  safeMode: true
  defaultGoalPlannerPolicy: supervised
  defaultValidationBundles: [proposal-ready-fast]
  defaultValidationBundle:
    scenarios: [docs-adr-pass, cli-verification-pass]
    regressions: [local-fast]
  allowedMutationScope: [docs, config, apps/web]
  autonomousPolicy:
    enabled: true
    mode: auto_execute_auto_promote_to_integration
    allowedTemplates:
      - docs-maintenance-pass
      - config-schema-maintenance
      - operator-ui-pass
      - runtime-validation-pass
    allowedDomains: [docs, backend, cli, frontend]
    allowedMutationScopes: [docs, config, apps/web]
    requiredValidationBundles: [proposal-ready-fast]
    requireSafeMode: true
    autoReviewGoalPlans: true
    autoMaterializeGoalPlans: true
    autoRunGroups: true
    autoValidateBundles: true
    autoPromoteToIntegration: true
    quarantineOnFailureCount: 2
    quarantineOnBlockedCount: 2
    protectedScopes:
      - packages/runtime-pi
      - packages/session-manager
      - services/session-gateway
      - services/orchestrator
