id: self-build-proposals
name: Self Build Proposals
description: Require proposal artifacts and validation bundles for code-oriented SPORE self-work.
workflowPolicy:
  reviewRequired: true
  approvalRequired: true
coordinationPolicy:
  maxHeldMs: 180000
selfWorkPolicy:
  allowedPaths: [docs, config, apps/web]
  forbiddenPaths: [packages/runtime-pi, services/session-gateway]
  allowedWorkKinds: [workflow]
  requiresProposalArtifacts: true
  requiresReview: true
  requiresHumanApproval: true
  safeModeDefault: true
  autonomousEligible: true
  allowedAutonomousTemplates:
    - operator-ui-pass
    - config-schema-maintenance
  allowedAutonomousMutationScopes: [docs, config, apps/web]
  requiredAutonomousValidationBundles: [proposal-ready-fast, integration-ready-core]
  quarantineThresholds:
    failureCount: 1
    blockedCount: 1
